name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api-lint-and-type:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy app

  api-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: campusconnect
          POSTGRES_PASSWORD: campusconnect
          POSTGRES_DB: campusconnect_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U campusconnect"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://campusconnect:campusconnect@localhost:5432/campusconnect_test
      DATABASE_URL_SYNC: postgresql+psycopg://campusconnect:campusconnect@localhost:5432/campusconnect_test
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      AUTH_SECRET: ci-test-secret-12345678901234567890
      APP_ENV: ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install uv
      - run: uv sync --all-extras
      - run: uv run alembic upgrade head
      - run: uv run pytest -xvs --cov=app --cov-report=term-missing --ignore=tests/test_scaffold.py

  web-lint-type-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: AUTH_SECRET=ci-test-secret-12345678901234567890 pnpm build

  web-e2e:
    runs-on: ubuntu-latest
    needs: [web-lint-type-build]
    defaults:
      run:
        working-directory: apps/web
    services:
      mailhog:
        image: mailhog/mailhog
        ports:
          - "1025:1025"
          - "8025:8025"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/web/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: AUTH_SECRET=ci-test-secret-12345678901234567890 SMTP_HOST=localhost SMTP_PORT=1025 pnpm test
